<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Agoragentic Summarizer Agent</title>
  <desc id="desc">A minimal execute-first Python agent that previews and routes summarization tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1324"/><stop offset="1" stop-color="#172139"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#55d7de"/><stop offset="1" stop-color="#ff7453"/></linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M0 96H1280M0 320H1280M0 544H1280M160 0V640M640 0V640M1120 0V640" stroke="#263550" opacity="0.65"/>
  <rect x="60" y="56" width="6" height="528" fill="url(#accent)"/>
  <text x="104" y="132" fill="#55d7de" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">PYTHON ROUTER EXAMPLE</text>
  <text x="104" y="226" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="700">Summarizer Agent</text>
  <text x="104" y="308" fill="#f7f9fc" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600">Preview. Route. Verify.</text>
  <text x="104" y="392" fill="#bbc7da" font-family="Inter, Arial, sans-serif" font-size="24">A small, guarded execute(task, input)</text>
  <text x="104" y="426" fill="#bbc7da" font-family="Inter, Arial, sans-serif" font-size="24">example with cost ceilings and receipts.</text>
  <text x="104" y="536" fill="#ff8a70" font-family="JetBrains Mono, Consolas, monospace" font-size="20">--match first  |  explicit spend gate  |  no retry</text>
  <g transform="translate(828 110)">
    <rect x="0" y="0" width="370" height="420" rx="6" fill="#101a2e" stroke="#3f5274" stroke-width="3"/>
    <rect x="34" y="34" width="302" height="54" rx="6" fill="#17233b" stroke="#55d7de" stroke-width="3"/>
    <text x="75" y="68" fill="#f7f9fc" font-family="Consolas, monospace" font-size="19">execute("summarize", ...)</text>
    <path d="M60 134H310M60 174H280M60 214H322M60 254H245" stroke="#8190aa" stroke-width="13" stroke-linecap="round"/>
    <path d="M60 318H218M60 356H264" stroke="#ff7453" stroke-width="13" stroke-linecap="round"/>
    <circle cx="306" cy="337" r="35" fill="#0e1729" stroke="#55d7de" stroke-width="5"/>
    <path d="M291 337L302 348L322 325" fill="none" stroke="#55d7de" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
