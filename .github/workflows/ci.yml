name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - run: python -m py_compile summarizer_agent.py test_summarizer_agent.py
      - run: python -m unittest -v
      - run: python summarizer_agent.py --help
